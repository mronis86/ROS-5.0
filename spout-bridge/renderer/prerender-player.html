<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' file: data: blob:; media-src 'self' file: data: blob:; style-src 'unsafe-inline'; script-src 'unsafe-inline'"
    />
    <title>ROS LED Prerender Player</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
      }
      #stage {
        position: fixed;
        inset: 0;
        background: transparent !important;
      }
      /* Hidden decoder — paint via canvas so Spout capture gets RGBA alpha. */
      video {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }
      img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: fill;
        background: transparent !important;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: transparent !important;
      }
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <script>
      const stage = document.getElementById('stage');
      let video = null;
      let canvas = null;
      let ctx = null;
      let raf = 0;
      let lastFrame = null;
      let image = null;
      let freezeTimer = 0;

      function stopLoop() {
        if (raf) {
          cancelAnimationFrame(raf);
          raf = 0;
        }
      }

      function clearCue() {
        stopLoop();
        if (freezeTimer) {
          clearTimeout(freezeTimer);
          freezeTimer = 0;
        }
        if (video) {
          try {
            video.pause();
            video.removeAttribute('src');
            video.load();
          } catch (_) {}
          video.remove();
          video = null;
        }
        if (canvas) {
          canvas.remove();
          canvas = null;
          ctx = null;
        }
        if (image) {
          image.remove();
          image = null;
        }
        lastFrame = null;
        stage.innerHTML = '';
      }

      function paintFrame() {
        if (!video || !ctx || !canvas) return;
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        if (video.readyState >= 2) {
          try {
            ctx.drawImage(video, 0, 0, w, h);
          } catch (_) {}
        } else if (lastFrame) {
          ctx.putImageData(lastFrame, 0, 0);
        }
      }

      function freezeLastFrame() {
        if (!video || !ctx || !canvas) return;
        try {
          if (video.duration && Number.isFinite(video.duration)) {
            video.currentTime = Math.max(0, video.duration - 0.001);
          }
          video.pause();
          paintFrame();
          lastFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        } catch (_) {}
      }

      function loop() {
        paintFrame();
        raf = requestAnimationFrame(loop);
      }

      function playAnimatedImage(fileUrl, options) {
        image = document.createElement('img');
        image.alt = '';
        image.decoding = 'sync';
        stage.appendChild(image);
        image.src = fileUrl;

        const durationMs = Math.max(0, Number(options.durationMs) || 0);
        if (durationMs > 0 && options.stillUrl) {
          freezeTimer = setTimeout(() => {
            if (!image) return;
            // Replace the finished animation with its lossless final PNG.
            image.src = options.stillUrl;
            freezeTimer = 0;
          }, durationMs);
        }
      }

      function playWebm(fileUrl) {
        clearCue();
        canvas = document.createElement('canvas');
        canvas.width = Math.max(2, window.innerWidth || 1920);
        canvas.height = Math.max(2, window.innerHeight || 1080);
        ctx = canvas.getContext('2d', { alpha: true });
        stage.appendChild(canvas);

        video = document.createElement('video');
        video.muted = true;
        video.loop = false;
        video.playsInline = true;
        video.preload = 'auto';
        video.src = fileUrl;

        video.addEventListener('ended', () => {
          freezeLastFrame();
        });

        stage.appendChild(video);
        loop();

        const playPromise = video.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => {});
        }
      }

      /** Play enter clip once; freeze on last frame (Spout keeps publishing it). */
      function playEnter(fileUrl, options = {}) {
        clearCue();
        if (!fileUrl) return;
        const format = String(options.format || '').toLowerCase();
        if (
          format === 'apng' ||
          format === 'webp' ||
          /\.(?:apng|webp)(?:$|\?)/i.test(fileUrl)
        ) {
          playAnimatedImage(fileUrl, options);
          return;
        }
        playWebm(fileUrl);
      }

      // Back-compat alias
      function playHold(fileUrl) {
        playEnter(fileUrl);
      }

      window.rosPrerenderPlayer = { playEnter, playHold, clearCue };
    </script>
  </body>
</html>
